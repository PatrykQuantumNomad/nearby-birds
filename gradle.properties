# JDK 24+: Gradle’s native-platform uses JNI; without this, the daemon logs restricted-method warnings.
org.gradle.jvmargs=-Xmx512m -XX:MaxMetaspaceSize=384m -Dfile.encoding=UTF-8 --enable-native-access=ALL-UNNAMED

# https://docs.gradle.org/current/userguide/configuration_cache.html
org.gradle.configuration-cache=true
